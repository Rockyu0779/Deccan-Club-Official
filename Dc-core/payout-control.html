  <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnOtH9lPEapTk7z64HbZ0PQgw6O8tNi-A",
            authDomain: "deccan-club-official.firebaseapp.com",
            projectId: "deccan-club-official",
            storageBucket: "deccan-club-official.firebasestorage.app",
            messagingSenderId: "61787320782",
            appId: "1:61787320782:web:18629bfae6ff064e107b9f"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        function getTodayDocId() {
            const d = new Date();
            const istDate = new Date(d.getTime() + 330 * 60 * 1000);
            const day = String(istDate.getUTCDate()).padStart(2, "0");
            const month = String(istDate.getUTCMonth() + 1).padStart(2, "0");
            const year = istDate.getUTCFullYear();
            return `${year}-${month}-${day}`;
        }

        const withdrawCardsContainer = document.getElementById("withdrawCardsContainer");
        const totalPendingWithdrawCounter = document.getElementById("totalPendingWithdrawCounter");
        const totalWithdrawAmountCounter = document.getElementById("totalWithdrawAmountCounter");
        const withdrawSearchEngineInput = document.getElementById("withdrawSearchEngineInput");
        const withdrawDateEngine = document.getElementById("withdrawDateEngine");
        const paginationControlsContainer = document.getElementById("paginationControlsContainer");

let liveWithdrawUnsubscribe = null;
let fullMasterDataset = [];
let filteredDataset = [];
let currentPage = 1;
const itemsPerPage = 20;

let activeModalPromiseResolver = null;

let selectedStr = "";
let dbFormattedDateAlternative1 = "";
let dbFormattedDateAlternative2 = "";

        const localDateObj = new Date();
        const year = localDateObj.getFullYear();
        const month = String(localDateObj.getMonth() + 1).padStart(2, '0');
        const day = String(localDateObj.getDate()).padStart(2, '0');
        withdrawDateEngine.value = `${year}-${month}-${day}`;

        let userNamesCacheMap = {};
function getUserName(req) {
    return (
        req.fullName ||
        req.name ||
        "Deccan Player"
    );
}

function getUserPhone(req) {
    return (
        req.userMobile ||
        req.userPhone ||
        req.mobile ||
        req.mobileNumber ||
        req.phone ||
        req.uid ||
        "N/A"
    );
}



        async function streamRealtimeWithdrawalPanel() {
           

            if(liveWithdrawUnsubscribe) { liveWithdrawUnsubscribe(); }

            selectedStr = withdrawDateEngine.value;
dbFormattedDateAlternative1 = "";
dbFormattedDateAlternative2 = "";

            if (selectedStr) {
                const parsedDate = new Date(selectedStr);
                const targetDayStr = String(parsedDate.getDate());
                const targetDayPadded = String(parsedDate.getDate()).padStart(2, '0');
                const targetMonthStr = String(parsedDate.getMonth() + 1);
                const targetMonthPadded = String(parsedDate.getMonth() + 1).padStart(2, '0');
                const targetYear = parsedDate.getFullYear();
                
                dbFormattedDateAlternative1 = `${targetDayPadded}/${targetMonthPadded}/${targetYear}`;
                dbFormattedDateAlternative2 = `${targetDayStr}/${targetMonthStr}/${targetYear}`;
            }

liveWithdrawUnsubscribe = db.collection("withdrawals")
    .where("timestamp", ">=", new Date(selectedStr + "T00:00:00"))
    .where("timestamp", "<", new Date(selectedStr + "T23:59:59"))
    .onSnapshot((snapshot) => {
                    fullMasterDataset = [];

                    if(snapshot.empty) {
                        withdrawCardsContainer.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:35px; font-weight:600;">No withdrawal requests found inside database.</div>`;
                        totalPendingWithdrawCounter.innerText = "0";
                        totalWithdrawAmountCounter.innerText = "₹0";
                        paginationControlsContainer.innerHTML = "";
                        return;
                    }

                    snapshot.forEach((doc) => {
                        let data = doc.data();
                        data.reqId = doc.id;
                        fullMasterDataset.push(data);
                    });

                    fullMasterDataset.sort((a, b) => {
                        const timeA = a.time?.seconds || a.timestamp?.seconds || 0;
                        const timeB = b.time?.seconds || b.timestamp?.seconds || 0;
                        return timeB - timeA;
                    });

                    syncAndApplyHybridFilters(dbFormattedDateAlternative1, dbFormattedDateAlternative2, selectedStr);
                }, (error) => { console.error("Snapshot Fault:", error); });
        }

        function syncAndApplyHybridFilters(dbFormattedDateAlternative1, dbFormattedDateAlternative2, selectedStr) {
            const queryValue = withdrawSearchEngineInput.value.toLowerCase().trim();

            let pendingRequestCount = 0;
            let totalSuccessAmountToday = 0;

            filteredDataset = fullMasterDataset.filter(req => {
                const currentStatus = String(req.status || "").trim().toLowerCase();
                const reqDate = String(req.date || "").trim();

                let firebaseDateStr = "";
                if (req.time && typeof req.time.toDate === 'function') {
                    const d = req.time.toDate();
                    firebaseDateStr = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
                } else if (req.timestamp && typeof req.timestamp.toDate === 'function') {
                    const d = req.timestamp.toDate();
                    firebaseDateStr = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
                }

                const isSelectedDate = (
                    reqDate === dbFormattedDateAlternative1 ||
                    reqDate === dbFormattedDateAlternative2 ||
                    reqDate === selectedStr ||
                    firebaseDateStr === selectedStr
                );

                if(currentStatus === "pending") { pendingRequestCount += 1; }

                if (isSelectedDate && (currentStatus === "success" || currentStatus === "approved")) {
                    totalSuccessAmountToday += Number(req.amount || 0);
                }

const dateMatches = isSelectedDate;
                

const userPhone = getUserPhone(req).toLowerCase();

const realUserName = getUserName(req);
                const userNameLower = String(realUserName).toLowerCase();
                
                const textMatches = !queryValue || userNameLower.includes(queryValue) || userPhone.includes(queryValue);

                return dateMatches && textMatches;
            });

            totalPendingWithdrawCounter.innerText = pendingRequestCount;
            totalWithdrawAmountCounter.innerText = "₹" + Number(totalSuccessAmountToday).toLocaleString('en-IN');

            renderPaginatedCards(currentPage);
        }

        function renderPaginatedCards(pageNumber) {
            currentPage = pageNumber;
            withdrawCardsContainer.innerHTML = "";

            if(filteredDataset.length === 0) {
                withdrawCardsContainer.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:35px; font-weight:600;">No withdrawal requests found for this criteria.</div>`;
                paginationControlsContainer.innerHTML = "";
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredDataset.slice(startIndex, endIndex);

            paginatedItems.forEach((req) => {
                const currentStatus = String(req.status || "").trim().toLowerCase();
                const realUserName = getUserName(req);
                const paymentMethod = req.method || 'UPI';

                let statusPillHtml = "";
                if(currentStatus === "pending") {
                    statusPillHtml = `<span class="compact-pill orange">Pending</span>`;
                } else if(currentStatus === "success" || currentStatus === "approved") {
                    statusPillHtml = `<span class="compact-pill green">Success</span>`;
                } else {
                    statusPillHtml = `<span class="compact-pill red">Refunded</span>`;
                }

                const cardHtml = `
                    <div class="withdraw-card-item" onclick="openDetailsModal('${req.reqId}')">
                        <div class="card-user-info">
                            <span class="card-user-name">${realUserName}</span>
                            <span class="card-method-badge">Method: ${paymentMethod}</span>
                        </div>
                        <div class="card-right-side">
                            <div class="card-amount-status">
                                <span class="card-amount">₹${Number(req.amount).toLocaleString('en-IN')}</span>
                                ${statusPillHtml}
                            </div>
                            <div class="card-arrow-icon">
                                <i class="fa-solid fa-chevron-right"></i>
                            </div>
                        </div>
                    </div>
                `;
                withdrawCardsContainer.insertAdjacentHTML("beforeend", cardHtml);
            });

            renderPaginationControls();
        }

        function renderPaginationControls() {
            const totalPages = Math.ceil(filteredDataset.length / itemsPerPage);
            paginationControlsContainer.innerHTML = "";

            if (totalPages <= 1) return;

            let prevBtn = `<div class="page-node-btn ${currentPage === 1 ? 'disabled' : ''}" style="background:var(--bg-card); color:#fff; padding:6px 12px; border:1px solid var(--border-dark); border-radius:4px; cursor:pointer;" onclick="renderPaginatedCards(${currentPage - 1})"><i class="fa-solid fa-angle-left"></i></div>`;
            paginationControlsContainer.insertAdjacentHTML("beforeend", prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                let activeStyle = (i === currentPage) ? "background:var(--gold-bright); color:#000; font-weight:bold;" : "background:var(--bg-card); color:#fff;";
                let pageBtn = `<div class="page-node-btn" style="${activeStyle} padding:6px 12px; border:1px solid var(--border-dark); border-radius:4px; cursor:pointer;" onclick="renderPaginatedCards(${i})">${i}</div>`;
                paginationControlsContainer.insertAdjacentHTML("beforeend", pageBtn);
            }

            let nextBtn = `<div class="page-node-btn ${currentPage === totalPages ? 'disabled' : ''}" style="background:var(--bg-card); color:#fff; padding:6px 12px; border:1px solid var(--border-dark); border-radius:4px; cursor:pointer;" onclick="renderPaginatedCards(${currentPage + 1})"><i class="fa-solid fa-angle-right"></i></div>`;
            paginationControlsContainer.insertAdjacentHTML("beforeend", nextBtn);
        }

        /* ⚡ HELPER FUNCTION FOR USER PROFILE REDIRECT */
        function openUserProfilePage(uid, phone) {
            if (uid) {
                window.location.href = `user-profile.html?uid=${uid}`;
            } else if (phone) {
                window.location.href = `user-profile.html?mobile=${phone}`;
            } else {
                showPremiumToast("User identity missing!", true);
            }
        }

        /* OPEN POPUP DETAILS MODAL */
        function openDetailsModal(requestId) {
            const req = fullMasterDataset.find(r => r.reqId === requestId);
            if(!req) return;

const realUserName = getUserName(req);

const userPhone = getUserPhone(req);

const paymentTargetRaw = req.detail || req.paymentDetails || "N/A";

const currentStatus = String(req.status || "").trim().toLowerCase();

            const modalUserNameNode = document.getElementById("modalUserName");
            const modalUserMobileNode = document.getElementById("modalUserMobile");

            modalUserNameNode.innerHTML = `${realUserName} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.75rem; margin-left: 4px;"></i>`;
            modalUserMobileNode.innerHTML = `${userPhone} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.75rem; margin-left: 4px;"></i>`;

            // Attach Click Listeners for Profile Navigation
const profilePhone =
    req.userMobile ||
    req.userPhone ||
    req.mobile ||
    req.mobileNumber ||
    req.phone;

document.getElementById("modalUserNameRow").onclick =
    () => openUserProfilePage(req.uid, profilePhone);

document.getElementById("modalUserMobileRow").onclick =
    () => openUserProfilePage(req.uid, profilePhone);

            document.getElementById("modalAmount").innerText = `₹${Number(req.amount).toLocaleString('en-IN')}`;
            document.getElementById("modalUpiDetails").innerText = paymentTargetRaw;
            document.getElementById("modalMethod").innerText = req.method || 'UPI';

            document.getElementById("modalCopyBtn").onclick = function(e) {
                e.stopPropagation();
                copyTargetToClipboard(paymentTargetRaw);
            };

            const firebaseTime = req.time || req.timestamp;
            let displayDateTime = req.date || "--/--/----";
            if(firebaseTime) {
                const dateObj = firebaseTime.toDate ? firebaseTime.toDate() : new Date(firebaseTime);
                displayDateTime = dateObj.toLocaleString('en-IN', { day: '2-digit', month: '2-digit', year: 'numeric' }) + " | " + dateObj.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            }
            document.getElementById("modalDateTime").innerText = displayDateTime;

            const statusBadgeNode = document.getElementById("modalStatusBadge");
            const reasonRow = document.getElementById("modalReasonRow");
            const actionFooterNode = document.getElementById("modalActionFooter");

            if(currentStatus === "pending") {
                statusBadgeNode.innerHTML = `<span class="compact-pill orange">Pending</span>`;
                reasonRow.style.display = "none";
                const userKey = req.uid || req.userMobile || req.userPhone || '';
                actionFooterNode.innerHTML = `
                    <button class="btn-action-modal approve" onclick="closeDetailsModal(); processWithdrawalAction('${req.reqId}', 'success', ${req.amount}, '${userKey}')"><i class="fa-solid fa-check"></i> Approve</button>
                    <button class="btn-action-modal reject" onclick="closeDetailsModal(); processWithdrawalAction('${req.reqId}', 'rejected', ${req.amount}, '${userKey}')"><i class="fa-solid fa-xmark"></i> Reject</button>
                `;
            } else if(currentStatus === "success" || currentStatus === "approved") {
                statusBadgeNode.innerHTML = `<span class="compact-pill green">Success</span>`;
                reasonRow.style.display = "none";
                actionFooterNode.innerHTML = "";
            } else {
                statusBadgeNode.innerHTML = `<span class="compact-pill red">Refunded</span>`;
                reasonRow.style.display = "flex";
                document.getElementById("modalReasonText").innerText = req.rejectReason || "No Reason Specified";
                actionFooterNode.innerHTML = "";
            }

            document.getElementById("withdrawDetailsModal").classList.add("active");
        }

        function closeDetailsModal() {
            document.getElementById("withdrawDetailsModal").classList.remove("active");
        }

        function showPremiumToast(message, isError = false) {
            const toastNode = document.getElementById("premiumToastAlert");
            const msgNode = document.getElementById("premiumToastMessage");
            const iconNode = document.getElementById("toastIconSlot");

            msgNode.innerText = message;
            
            if(isError) {
                toastNode.classList.add("toast-error");
                iconNode.className = "fa-solid fa-circle-xmark";
            } else {
                toastNode.classList.remove("toast-error");
                iconNode.className = "fa-solid fa-circle-check";
            }

            toastNode.classList.add("active");
            setTimeout(() => { toastNode.classList.remove("active"); }, 2000);
        }

        function openPremiumConfirmModal(config) {
            return new Promise((resolve) => {
                activeModalPromiseResolver = resolve;
                const modal = document.getElementById("customActionModal");
                const iconContainer = document.getElementById("modalIconContainer");
                const titleNode = document.getElementById("modalTitleHeading");
                const bodyNode = document.getElementById("modalBodyText");
                const reasonInput = document.getElementById("modalReasonInput");
                const confirmBtn = document.getElementById("modalConfirmBtn");

                titleNode.innerText = config.title;
                bodyNode.innerText = config.text;
                reasonInput.value = config.defaultInput || "";
                
                if(config.showInput) {
                    reasonInput.style.display = "block";
                    reasonInput.placeholder = config.inputPlaceholder || "Enter reason...";
                } else {
                    reasonInput.style.display = "none";
                }

                if(config.type === "approve") {
                    iconContainer.className = "modal-icon-frame modal-icon-approve";
                    iconContainer.innerHTML = `<i class="fa-solid fa-shield-heart"></i>`;
                    confirmBtn.className = "modal-btn btn-confirm btn-success";
                } else {
                    iconContainer.className = "modal-icon-frame modal-icon-reject";
                    iconContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>`;
                    confirmBtn.className = "modal-btn btn-confirm btn-danger";
                }

                confirmBtn.innerText = config.confirmText || "Confirm";
                
                confirmBtn.onclick = () => {
                    const valueToReturn = config.showInput ? reasonInput.value : true;
                    modal.classList.remove("active");
                    resolve(valueToReturn);
                };

                modal.classList.add("active");
            });
        }

        function closePremiumModal() {
            document.getElementById("customActionModal").classList.remove("active");
            if(activeModalPromiseResolver) {
                activeModalPromiseResolver(null);
                activeModalPromiseResolver = null;
            }
        }

        function copyTargetToClipboard(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                showPremiumToast("Details copied successfully!");
            }).catch(err => { console.error("Clipboard failure:", err); });
        }

        async function processWithdrawalAction(requestId, targetStatus, amount, userId) {
          const req = fullMasterDataset.find(r => r.reqId === requestId);
if (!req) {
    showPremiumToast("Request not found!", true);
    return;
}
            const targetNorm = String(targetStatus).toLowerCase();

            if (targetNorm === "success") {
                const confirmApprove = await openPremiumConfirmModal({
                    title: "Approve Withdrawal",
                    text: `Approve withdrawal of ₹${amount}?`,
                    type: "approve",
                    confirmText: "Approve",
                    showInput: false
                });

                if (!confirmApprove) return;

                try {
                    let batch = db.batch();

                    const withdrawRef = db.collection("withdrawals").doc(requestId);
                    batch.update(withdrawRef, { 
                        status: "success", 
                        approvedAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });

                    const todayAnalyticsDocId = getTodayDocId();
                    const analyticsRef = db.collection("daily_analytics").doc(todayAnalyticsDocId);
                    batch.set(analyticsRef, {
                        totalWithdrawals: firebase.firestore.FieldValue.increment(Number(amount))
                    }, { merge: true });

                    if (userId) {
                        const userSnap = await db.collection("user-management").doc(userId).get();
                        if (userSnap.exists) {
                            batch.update(userSnap.ref, { 
                                totalWithdrawals: firebase.firestore.FieldValue.increment(Number(amount)) 
                            });
                        }
                    }

                    await batch.commit();

                    try {
                        const txSnapshot = await db.collection("transactions").where("transactionId", "==", requestId).get();
                        txSnapshot.forEach((txDoc) => {
                            txDoc.ref.update({ status: "success", remark: "Withdrawal Approved" });
                        });
                    } catch(e) { console.log("Tx background sync notice:", e); }

                    showPremiumToast("Withdrawal Approved & Summary Updated!");
                } catch(err) {
                    console.error(err);
                    showPremiumToast("Error: " + err.message, true);
                }
            }
            else if (targetNorm === "rejected") {
                const rejectionReason = await openPremiumConfirmModal({
                    title: "Reject Withdrawal",
                    text: `Enter reason for rejecting this withdrawal request of ₹${amount.toLocaleString('en-IN')}:`,
                    type: "reject",
                    confirmText: "Reject & Refund",
                    showInput: true,
                    defaultInput: "Wrong UPI ID / Account Details",
                    inputPlaceholder: "Enter remarks for user..."
                });

                if (rejectionReason === null) return; 
                const cleanReason = rejectionReason.trim() || "Rejected By Admin";

                try {
                    let batch = db.batch();
                    const withdrawRef = db.collection("withdrawals").doc(requestId);
                    
                    batch.update(withdrawRef, { 
                        status: "rejected", 
                        rejectReason: cleanReason 
                    });
                    
                    if (userId) {
                        const userSnap = await db.collection("user-management").doc(userId).get();
                        if (userSnap.exists) {
                            batch.update(userSnap.ref, { 
                                accountBalance: firebase.firestore.FieldValue.increment(Number(amount)) 
                            });
                        }
                    }

                    await batch.commit();

                    try {
                        const txSnapshot = await db.collection("transactions").where("uid", "==", userId).get();
                        txSnapshot.forEach((txDoc) => {
                            let txData = txDoc.data();
                            if (txDoc.id === requestId || txData.transactionId === requestId || txData.withdrawalId === requestId) {
                                txDoc.ref.update({ status: "rejected", remark: cleanReason });
                            }
                        });
                    } catch(e) { console.log("Tx background sync notice:", e); }

                    showPremiumToast(`Request Rejected! ₹${amount} refunded.`);
                } catch(err) { 
                    console.error(err);
                    showPremiumToast("Error: " + err.message, true); 
                }
            }
        }

        withdrawSearchEngineInput.addEventListener("input", () => {
    currentPage = 1;
    syncAndApplyHybridFilters(
        dbFormattedDateAlternative1,
        dbFormattedDateAlternative2,
        withdrawDateEngine.value
    );
});

withdrawDateEngine.addEventListener("change", () => {
    currentPage = 1;

    selectedStr = withdrawDateEngine.value;

    const parsedDate = new Date(selectedStr);

    const targetDayStr = String(parsedDate.getDate());
    const targetDayPadded = String(parsedDate.getDate()).padStart(2, "0");
    const targetMonthStr = String(parsedDate.getMonth() + 1);
    const targetMonthPadded = String(parsedDate.getMonth() + 1).padStart(2, "0");
    const targetYear = parsedDate.getFullYear();

    dbFormattedDateAlternative1 = `${targetDayPadded}/${targetMonthPadded}/${targetYear}`;
    dbFormattedDateAlternative2 = `${targetDayStr}/${targetMonthStr}/${targetYear}`;

    syncAndApplyHybridFilters(
        dbFormattedDateAlternative1,
        dbFormattedDateAlternative2,
        selectedStr
    );
});

streamRealtimeWithdrawalPanel();
