async function loadRates() {
    const snap = await db.collection("app_settings").doc("global_config").get();

    const rates = snap.data().game_rates || {};
    RATE = {
        'Digit (अंक)': Number(rates.ank?.split("-")[1] || 95) / 10,

        'triple pana': Number(rates.triplepana?.split("-")[1] || 9000) / 10,
        'half sangam': Number(rates.halfsangam?.split("-")[1] || 10000) / 10,
        'full sangam': Number(rates.fullsangam?.split("-")[1] || 100000) / 10
    };
}

const t = new Date();

function syncVisualDateDisplay() {
    const rawVal = nativeInputEl.value; 
    if(!rawVal) return;
    const parts = rawVal.split("-");
    if(parts.length === 3) {
        const ddmmYYYYFormat = `${parts[2]}-${parts[1]}-${parts[0]}`; 
        document.getElementById("visualDateText").innerText = ddmmYYYYFormat;
    }
}

function formatToDDMMYYYY(rawDateValue) {
    if (!rawDateValue) return "";
    const parts = rawDateValue.split("-");
    if (parts.length === 3) { return `${parts[2]}-${parts[1]}-${parts[0]}`; }
    return rawDateValue;
}

function formatToSlashFormat(dashDateStr) {
    if(!dashDateStr) return "";
    return dashDateStr.replace(/-/g, "/");
}

function buildHistoryDocId(dateStr, marketName) {
    const cleanDateToken = String(dateStr).replace(/-/g, "_");
    return `${cleanDateToken}_${marketName}`;
}

function timeToMinutes(str){
    if(!str) return 0;
    str = str.toUpperCase();
    let [time,mod] = str.split(' ');
    let [h,m] = time.split(':');
    h = parseInt(h); m = parseInt(m || 0);
    if(mod === 'PM' && h !== 12) h += 12;
    if(mod === 'AM' && h === 12) h = 0;
    return h*60+m;
}

function calcDigit(val){
    if(!val || val.length !== 3) return '*';
    const sum = val.split('').reduce((a,b)=>a+parseInt(b || 0),0);
    return String(sum % 10);
}

function launchPremiumToast(messageStr) {

    }, 1000); 
}

async function loadMarkets(){

        const historySnap = await db.collection('market_results_history').where('date', '==', targetDbBidDate).get();

        let historyLookup = {};
        historySnap.forEach(doc => {
            const data = doc.data();
            historyLookup[data.market] = data;
        });

        let arr = [];
        snap.docs.forEach((docSnap) => {
            const m = docSnap.data();
            const marketName = m.name || docSnap.id;
            const todayDay = new Date(selectedHtmlDate).toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();

            const isDayOff = m.daysActive && m.daysActive[todayDay] === false;
            
            let openPana = '***'; let openResult = '*';
            let closePana = '***'; let closeResult = '*';
            let currentStatus = 'Pending';

            // 🛠️ DATA EXTRACTION RE-ENGINEERED (Direct fallbacks to market doc)
            if (historyLookup[marketName]) { 
                const histData = historyLookup[marketName];
                openPana = histData.openPana || '***';
                openResult = histData.openAnk || '*';
                closePana = histData.closePana || '***';
                closeResult = histData.closeAnk || '*';
            } 
            else if (selectedHtmlDate === currentSystemDateStr && m.date === targetDbBidDate) {
                openPana = m.openPana || '***';
                openResult = m.openAnk || '*';
                closePana = m.closePana || '***';
                closeResult = m.closeAnk || '*';
            }

            if(openPana === '***' && closePana === '***') {
                currentStatus = 'Pending';
            } else if(openPana !== '***' && closePana === '***') {
                currentStatus = 'Open Declared';
            } else if(openPana !== '***' && closePana !== '***') {
                currentStatus = 'Result Declared';
            }

            arr.push({
                id: docSnap.id, name: marketName, openTime: m.openTime || '00:00', closeTime: m.closeTime || '00:00',
                openPana: openPana, openResult: openResult, closePana: closePana, closeResult: closeResult,
                status: currentStatus, isHoliday: isHoliday, isDayOff: isDayOff
            });
        });

        arr.sort((a,b)=>{
            if(a.status === 'Result Declared' && b.status !== 'Result Declared') return 1;
            if(a.status !== 'Result Declared' && b.status === 'Result Declared') return -1;
            return timeToMinutes(a.openTime) - timeToMinutes(b.openTime);
        });

        marketList.innerHTML = '';
        arr.forEach((m, index)=>{
            const isHoliday = m.isHoliday === true;
            const isDayOff = m.isDayOff === true;

            // 🛠️ REMOVED INPUT DISABLE UNLOCK (Admin can view and update anytime unless market is holiday/dayoff)

            const safeMarketName = m.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const safeMarketId = m.id.replace(/'/g, "\\'").replace(/"/g, '\\"');

            marketList.innerHTML += `
            <div class="premium-market-card" data-market-search-name="${m.name.toLowerCase()}">
                
                <div class="premium-card-header-line" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h2 class="premium-market-title" style="font-size: 1.1rem; font-weight: 700; color: #fff; margin: 0;">${m.name}</h2>
                    <div class="compact-pill ${pillClass}">
                        ${isHoliday ? 'HOLIDAY' : (isDayOff ? 'DAY OFF' : m.status)}
                    </div>
                </div>

                <div class="premium-result-display-box" style="background: var(--bg-input); padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 12px;">
                    <div class="result-label" style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px;">LIVE RESULT</div>
                    <h2 class="result-numbers" id="preview_${index}" style="font-size: 1.4rem; font-weight: 800; color: var(--gold-bright); letter-spacing: 1px; margin-top: 2px; margin-bottom: 0;">${m.openPana}-${m.openResult}${m.closeResult}-${m.closePana}</h2>
                </div>

                <div class="premium-time-cards-grid">
                    <div class="premium-time-card" style="background: var(--bg-input); padding: 8px; border-radius: 6px; display: flex; align-items: center; gap: 10px;">
                        <div class="icon-wrap-open" style="color: var(--gold-bright); font-size: 1.1rem;"><i class="fa-solid fa-sun"></i></div>

                            <span style="font-size: 0.7rem; color: var(--text-muted);">Open</span>

                        </div>
                    </div>
                    <div class="premium-time-card" style="background: var(--bg-input); padding: 8px; border-radius: 6px; display: flex; align-items: center; gap: 10px;">
                        <div class="icon-wrap-close" style="color: #38bdf8; font-size: 1.1rem;"><i class="fa-solid fa-moon"></i></div>
                        <div class="time-details" style="display: flex; flex-direction: column;">
                            <span style="font-size: 0.7rem; color: var(--text-muted);">Close</span>

                    </div>

                <div class="premium-sessions-row-wrapper" style="margin-bottom: 12px;">
                    <div class="premium-session-inner-card" id="openBox_${index}" style="background: var(--bg-input); padding: 10px; border-radius: 8px;">
                        <div class="session-title" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px;"><i class="fa-solid fa-door-open"></i> Open</div>
                        <div class="premium-session-inputs-flex" style="display: flex; gap: 6px;">
                            <input type="text" maxlength="3" id="op_${index}" placeholder="***" value="${m.openPana === '***' ? '' : m.openPana}" ${isMarketLocked ? 'disabled' : ''} oninput="handlepanaInput(${index}, 'op', 'od')" style="width: 100%; background: #131722; border: 1px solid var(--border-dark); color: #fff; padding: 6px; border-radius: 4px; text-align: center; font-weight: 700; outline: none;">
                            <input type="text" readonly id="od_${index}" placeholder="*" value="${m.openResult === '*' ? '' : m.openResult}" style="width: 50px; background: #131722; border: 1px solid var(--border-dark); color: var(--gold-bright); padding: 6px; border-radius: 4px; text-align: center; font-weight: 700; outline: none;">
                        </div>
                    </div>
                    
                    <div class="premium-session-inner-card" id="closeBox_${index}" style="background: var(--bg-input); padding: 10px; border-radius: 8px;">

                        <div class="premium-session-inputs-flex" style="display: flex; gap: 6px;">

                            <input type="text" readonly id="cd_${index}" placeholder="*" value="${m.closeResult === '*' ? '' : m.closeResult}" style="width: 50px; background: #131722; border: 1px solid var(--border-dark); color: var(--gold-bright); padding: 6px; border-radius: 4px; text-align: center; font-weight: 700; outline: none;">
                        </div>
                    </div>
                </div>

                <div class="premium-metric-pills-row">
                    <div class="premium-metric-pill-box" style="background: var(--bg-input); padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;">
                        <div class="metric-info-side">
                            <label style="display: block; font-size: 0.7rem; color: var(--text-muted);">Total Winners</label>
                            <val id="winner_${index}" style="font-size: 1rem; font-weight: 800; color: #fff;">0</val>
                        </div>

                    </div>
                    <div class="premium-metric-pill-box" style="background: var(--bg-input); padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;">

function updatePreview(index){
    const opEl = document.getElementById(`op_${index}`);
    const odEl = document.getElementById(`od_${index}`);
    const cpEl = document.getElementById(`cp_${index}`);
    const cdEl = document.getElementById(`cd_${index}`);

    let op = (opEl && opEl.value.trim()) ? opEl.value.trim() : '***';
    let od = (odEl && odEl.value.trim()) ? odEl.value.trim() : '*';
    let cp = (cpEl && cpEl.value.trim()) ? cpEl.value.trim() : '***';
    let cd = (cdEl && cdEl.value.trim()) ? cdEl.value.trim() : '*';

    const targetPreview = document.getElementById(`preview_${index}`);
    if(targetPreview) { 
        targetPreview.innerText = `${op}-${od}${cd}-${cp}`; 
    }
}

function handlepanaInput(index, panaInputId, digitInputId) {
    const pInput = document.getElementById(`${panaInputId}_${index}`);
    if(pInput) {
        const d = calcDigit(pInput.value);
        const dInput = document.getElementById(`${digitInputId}_${index}`);
        if(dInput) {
            dInput.value = d === '*' ? '' : d;
        }
    }
    updatePreview(index);
}

function getAutoScope(index) {
    const opInput = document.getElementById(`op_${index}`);
    const cpInput = document.getElementById(`cp_${index}`);
    const isOpActive = opInput.value.trim().length === 3;
    const isCpActive = cpInput.value.trim().length === 3;
    if (isOpActive && isCpActive) return 'both';
    if (isOpActive) return 'open_only';
    if (isCpActive) return 'close_only';
    return 'both';
}

function executeClientSideSearch() {
    const val = document.getElementById('searchInput').value.toLowerCase().trim();
    document.querySelectorAll('.premium-market-card').forEach(card => {
        const targetNameMatch = card.getAttribute('data-market-search-name') || '';
        if (targetNameMatch.includes(val)) {
            card.style.setProperty('display', 'block', 'important');
        } else {
            card.style.setProperty('display', 'none', 'important');
        }
    });
}

window.showWinners = async function(marketName, index){
    const panel = document.getElementById(`panel_${index}`);
    if(!panel) return;
    
    if(panel.classList.contains('active-preview')) {
        panel.classList.remove('active-preview');
        panel.innerHTML = '';
        return;
    }

    panel.innerHTML = '<div style="color:var(--text-muted); font-weight:700; font-size:12px; text-align:center; width:100%; padding: 8px 0;"><i class="fa-solid fa-circle-notch fa-spin"></i> Scanning ledger nodes...</div>';
    panel.classList.add('active-preview');

    const scope = getAutoScope(index);
    const od = document.getElementById(`od_${index}`).value.trim() || '*';
    const cd = document.getElementById(`cd_${index}`).value.trim() || '*';
    const op = document.getElementById(`op_${index}`).value.trim() || '***';
    const cp = document.getElementById(`cp_${index}`).value.trim() || '***';
    
    const selectedHtmlDate = nativeInputEl.value; 
    const targetDbBidDateDash = formatToDDMMYYYY(selectedHtmlDate); 
    const targetDbBidDateSlash = formatToSlashFormat(targetDbBidDateDash); 

    const jodi = `${od}${cd}`;
    let totalWinner = 0; let totalPayout = 0;

    try {
        const snap = await db.collection('bids').where('market', '==', marketName).get();
        let htmlBuffer = '';
        
        snap.forEach(bidDoc => {
            const b = bidDoc.data();
            if (b.bidDate !== targetDbBidDateSlash) return;

            const gameName = String(b.game || b.gameType || '').toLowerCase();
            const sessionType = String(b.type || b.session || '').toLowerCase();
            const bidDigit = String(b.digit || '').trim();
            const pointsAmt = parseFloat(b.points || 0);
            let win = false;

            if (scope === 'both' || scope === 'open_only') {
                if(sessionType.includes('open') && (gameName.includes('digit') || gameName.includes('single') || gameName.includes('अंक')) && bidDigit === od) win = true;
                if(sessionType.includes('open') && gameName.includes('pana') && bidDigit === op) win = true;
            }
            if (scope === 'both' || scope === 'close_only') {
                if(sessionType.includes('close') && (gameName.includes('digit') || gameName.includes('single') || gameName.includes('अंक')) && bidDigit === cd) win = true;
                if(sessionType.includes('close') && gameName.includes('pana') && bidDigit === cp) win = true;
            }
            if (scope === 'both' && gameName.includes('jodi') && bidDigit === jodi) win = true;

            if(win) {
                const cleanRateKey = gameName.includes('full sangam') ? 'full sangam' : gameName.includes('half sangam') ? 'half sangam' : gameName.includes('jodi') ? 'jodi digit' : gameName.includes('triple') ? 'triple pana' : gameName.includes('double') ? 'double pana' : gameName.includes('pana') ? 'single pana' : 'Digit (अंक)';
                const rateMulti = RATE[cleanRateKey] || 10;
                const payoutCalculation = pointsAmt * rateMulti;

                htmlBuffer += `
                <div class="premium-winner-item-row" style="display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-dark);">
                    <div>
                        <div class="winner-name" style="font-weight: 700; color: #f8fafc; font-size: 0.85rem;">${b.userName || 'Deccan Player'}</div>
                        <div class="winner-info" style="font-size: 11px; color: var(--text-muted);">${b.game || 'Digit (अंक)'} (${sessionType}) | Digit: ${bidDigit} | Pts: ${pointsAmt}</div>
                    </div>
                    <div class="winner-amount" style="font-weight: 700; color: var(--pill-green-text); font-size: 0.88rem;">₹${payoutCalculation.toLocaleString('en-IN')}</div>
                </div>`;
                totalWinner++; totalPayout += payoutCalculation;
            }
        });

        document.getElementById(`winner_${index}`).innerText = totalWinner;
        document.getElementById(`payout_${index}`).innerText = `₹${totalPayout.toLocaleString('en-IN')}`;
        
        if(totalWinner === 0){ 
            panel.classList.remove('active-preview');
            panel.innerHTML = '';
            
            Swal.fire({
                title: 'No Winners',
                text: 'No matching winning nodes found inside ledger.',
                icon: 'info',
                confirmButtonText: 'OK',
                background: '#161920',
                color: '#fff',
                confirmButtonColor: '#ffb703'
            });
        } else {
            panel.innerHTML = htmlBuffer;
        }
    } catch(err) { 
        panel.innerHTML = `<div style="color:var(--pill-red-text); font-size:11px; text-align:center; padding: 4px 0;">Error scan: ${err.message}</div>`; 
    }
};

window.declareResult = async function(marketId, marketName, index){
    const dBtn = document.getElementById(`dBtn_${index}`);
    const scope = getAutoScope(index);
    let op = document.getElementById(`op_${index}`).value.trim();
    let od = document.getElementById(`od_${index}`).value.trim();
    let cp = document.getElementById(`cp_${index}`).value.trim();
    let cd = document.getElementById(`cd_${index}`).value.trim();
    
    const selectedHtmlDate = nativeInputEl.value; 
    const targetDbBidDateDash = formatToDDMMYYYY(selectedHtmlDate); 
    const targetDbBidDateSlash = formatToSlashFormat(targetDbBidDateDash);

    if(scope === 'both' && (!op || !cp || od === '*' || cd === '*')) { 
        Swal.fire({title: '🚨 Alert', text: 'Please specify complete input values!', icon: 'error', background: '#161920', color: '#fff'}); 
        return; 
    }
    if(scope === 'open_only' && (!op || od === '*')) { 
        Swal.fire({title: '🚨 Alert', text: 'Please specify Open Session inputs!', icon: 'error', background: '#161920', color: '#fff'}); 
        return; 
    }
    if(scope === 'close_only' && (!cp || cd === '*')) { 
        Swal.fire({title: '🚨 Alert', text: 'Please specify Close Session inputs!', icon: 'error', background: '#161920', color: '#fff'}); 
        return; 
    }

    dBtn.disabled = true; dBtn.innerText = "Processing Payouts...";

    try {
        const historyDocId = buildHistoryDocId(targetDbBidDateDash, marketName);
        const histDocRef = db.collection('market_results_history').doc(historyDocId);
        const existingHist = await histDocRef.get();

        let finalOp = op || '***'; let finalOd = od || '*';
        let finalCp = cp || '***'; let finalCd = cd || '*';

        if(existingHist.exists) {
            const currentData = existingHist.data();
            if(!op && currentData.openPana) { finalOp = currentData.openPana; finalOd = currentData.openAnk; }
            if(!cp && currentData.closePana) { finalCp = currentData.closePana; finalCd = currentData.closeAnk; }
        }

        const compositeResultStr = `${finalOp}-${finalOd}${finalCd}-${finalCp}`;

        if (selectedHtmlDate === currentSystemDateStr) {
            await db.collection('markets').doc(marketId).update({
                openPana: finalOp, openAnk: finalOd, closePana: finalCp, closeAnk: finalCd,
                result: compositeResultStr, status: (finalOp !== '***' && finalCp !== '***') ? "closed" : "open", 
                date: targetDbBidDateDash,
                isManual: true
            });
        }

        await histDocRef.set({
            market: marketName, result: compositeResultStr, openPana: finalOp, openAnk: finalOd, closePana: finalCp, closeAnk: finalCd,
            date: targetDbBidDateDash, sessionScope: scope, isManual: true, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        const snap = await db.collection('bids').where('market', '==', marketName).get();
        let totalDistributedBatchCounter = 0;

        for(const bidDoc of snap.docs) {
            const b = bidDoc.data();
            if (b.bidDate !== targetDbBidDateSlash) continue;
            if (b.status !== 'Pending') continue;

            const gameName = String(b.game || b.gameType || '').toLowerCase();
            const sessionType = String(b.type || b.session || '').toLowerCase();
            const bidDigit = String(b.digit || '').trim();
            const pointsAmt = parseFloat(b.points || 0);

            let isWinNode = false; let processThisBid = false;
            if (scope === 'open_only' && sessionType.includes('open')) processThisBid = true;
            if (scope === 'close_only' && sessionType.includes('close')) processThisBid = true;
            if (scope === 'both') processThisBid = true;

            if (processThisBid) {
                if(sessionType.includes('open')) {
                    if((gameName.includes('digit') || gameName.includes('single') || gameName.includes('अंक')) && bidDigit === finalOd) isWinNode = true;
                    if(gameName.includes('pana') && bidDigit === finalOp) isWinNode = true;
                }
                if(sessionType.includes('close')) {
                    if((gameName.includes('digit') || gameName.includes('single') || gameName.includes('अंक')) && bidDigit === finalCd) isWinNode = true;
                    if(gameName.includes('pana') && bidDigit === finalCp) isWinNode = true;
                }
                if(scope === 'both' || (finalOd !== '*' && finalCd !== '*')) {
                    if(gameName.includes('jodi') && bidDigit === `${finalOd}${finalCd}`) isWinNode = true;
                }

                if(isWinNode) {
                    const cleanRateKey = gameName.includes('full sangam') ? 'full sangam' : gameName.includes('half sangam') ? 'half sangam' : gameName.includes('jodi') ? 'jodi digit' : gameName.includes('triple') ? 'triple pana' : gameName.includes('double') ? 'double pana' : gameName.includes('pana') ? 'single pana' : 'Digit (अंक)';
                    const rateMulti = RATE[cleanRateKey] || 10;
                    const totalWinningRewardPayout = pointsAmt * rateMulti;

                    if(b.userMobile) {
                        let userProfileRef = null;
                        if(b.uid) { userProfileRef = db.collection('user-management').doc(b.uid); } 
                        else {
                            const lookupSnap = await db.collection('user-management').where('mobileNumber', '==', b.userMobile).limit(1).get();
                            if(!lookupSnap.empty) { userProfileRef = lookupSnap.docs[0].ref; }
                        }
                        if(userProfileRef) { await userProfileRef.update({ accountBalance: firebase.firestore.FieldValue.increment(totalWinningRewardPayout) }); }
                        
                        await db.collection('winnings').add({
                            amount: totalWinningRewardPayout, date: targetDbBidDateSlash, type: "WINNING", status: "credited", uid: b.uid || "",
                            userMobile: b.userMobile || "", userName: b.userName || "", marketName: marketName, gameType: b.game || "",
                            winningSession: sessionType || "", winningNumber: b.digit || "", bidAmount: pointsAmt, winningAmount: totalWinningRewardPayout,
                            remark: `Winning: ${marketName} (${b.game || 'Digit'})`, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    await db.collection('bids').doc(bidDoc.id).update({ status: "Won", winAmount: totalWinningRewardPayout });
                    totalDistributedBatchCounter++;
                } else {
                    await db.collection('bids').doc(bidDoc.id).update({ status: "Loss", winAmount: 0 });
                }
            }
        }
        launchPremiumToast(`🏆 Success: Distributed payouts to ${totalDistributedBatchCounter} nodes successfully!`);
    } catch(err) { 
        console.error(err); 
        Swal.fire({title: 'Crash', text: err.message, icon: 'error', background: '#161920', color: '#fff'}); 
    } 
    finally { dBtn.disabled = false; dBtn.innerHTML = `<i class="fa-solid fa-trophy"></i> Declare Result`; }
}

window.revertResult = async function(marketId, marketName, index){
    const selectedHtmlDate = nativeInputEl.value;
    const targetDbBidDateDash = formatToDDMMYYYY(selectedHtmlDate); 
    const targetDbBidDateSlash = formatToSlashFormat(targetDbBidDateDash); 

    Swal.fire({
        title: 'Revert Market Settlement',
        html: `Select the targeted operation context to reverse ledger states for <br><b>${marketName}</b>:`,
        icon: 'warning', showDenyButton: true, showCancelButton: true,
        confirmButtonText: '☀ Open Only', denyButtonText: '🌙 Close Only', cancelButtonText: '🔄 Full Revert',
        allowOutsideClick: false,
        background: '#161920',
        color: '#fff'
    }).then(async (choiceResult) => {
        let selectedScope = "";
        if (choiceResult.isConfirmed) { selectedScope = "open_only"; } 
        else if (choiceResult.isDenied) { selectedScope = "close_only"; } 
        else if (choiceResult.dismiss === Swal.DismissReason.cancel) { selectedScope = "both"; } 
        else { return; }

        Swal.fire({ 
            title: 'Reverting Database States...', 
            html: 'Auditing transactions ledger logs and reversing user wallet accounts balance...', 
            allowOutsideClick: false, 
            background: '#161920',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); } 
        });

        try {
            const bidSnap = await db.collection('bids').where('market', '==', marketName).get();
            let balanceRevertedCount = 0;

            for (const bidDoc of bidSnap.docs) {
                const bidData = bidDoc.data();
                if(bidData.bidDate !== targetDbBidDateSlash) continue;

                const sessionType = String(bidData.type || bidData.session || '').toLowerCase();
                const currentStatus = bidData.status;
                const winAmount = parseFloat(bidData.winAmount || 0);

                let resetThisBid = false;
                if (selectedScope === 'both') resetThisBid = true;
                if (selectedScope === 'open_only' && sessionType.includes('open')) resetThisBid = true;
                if (selectedScope === 'close_only' && sessionType.includes('close')) resetThisBid = true;

                if (resetThisBid && currentStatus === "Won" && winAmount > 0 && bidData.userMobile) {
                    let userProfileRef = null;
                    if(bidData.uid) { userProfileRef = db.collection('user-management').doc(bidData.uid); } 
                    else {
                        const lookupSnap = await db.collection('user-management').where('mobileNumber', '==', bidData.userMobile).limit(1).get();
                        if(!lookupSnap.empty) { userProfileRef = lookupSnap.docs[0].ref; }
                    }
                    if(userProfileRef) { await userProfileRef.update({ accountBalance: firebase.firestore.FieldValue.increment(-winAmount) }); }

                    await db.collection('transactions').add({
                        amount: winAmount, date: targetDbBidDateSlash, type: "REVERT", status: "reverted", uid: bidData.uid || "",
                        userMobile: bidData.userMobile || "", userName: bidData.userName || "", marketName: marketName, gameType: bidData.game || "",
                        winningSession: sessionType || "", winningNumber: bidData.digit || "", bidAmount: bidData.points || 0, winningAmount: winAmount,
                        remark: `Winning Reverted Due To Wrong Result: ${marketName}`, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    balanceRevertedCount++;
                }
                if (resetThisBid) { await db.collection('bids').doc(bidDoc.id).update({ status: "Pending", winAmount: firebase.firestore.FieldValue.delete() }); }
            }

            const txSnap = await db.collection('transactions').where('date', '==', targetDbBidDateSlash).get();
            for (const txDoc of txSnap.docs) {
                const txData = txDoc.data(); const remarkStr = String(txData.remark || '').toLowerCase();
                if (remarkStr.includes(`winning: ${marketName.toLowerCase()}`)) {
                    let deleteTx = false;
                    if (selectedScope === 'both') deleteTx = true;
                    if (selectedScope === 'open_only' && remarkStr.includes('open')) deleteTx = true;
                    if (selectedScope === 'close_only' && remarkStr.includes('close')) deleteTx = true;
                    if (deleteTx) { await db.collection('transactions').doc(txDoc.id).delete(); }
                }
            }

            const winColSnap = await db.collection('winnings').where('marketName', '==', marketName).where('date', '==', targetDbBidDateSlash).get();
            for (const winDoc of winColSnap.docs) {
                const winData = winDoc.data(); const winSession = String(winData.winningSession || '').toLowerCase();
                let deleteWin = false;
                if (selectedScope === 'both') deleteWin = true;
                if (selectedScope === 'open_only' && winSession.includes('open')) deleteWin = true;
                if (selectedScope === 'close_only' && winSession.includes('close')) deleteWin = true;
                if (deleteWin) { await db.collection('winnings').doc(winDoc.id).delete(); }
            }

            const historyDocId = buildHistoryDocId(targetDbBidDateDash, marketName);
            const histDoc = await db.collection('market_results_history').doc(historyDocId).get();

            let op = '***'; let od = '*'; let cp = '***'; let cd = '*';
            if(histDoc.exists) {
                const hd = histDoc.data(); op = hd.openPana || '***'; od = hd.openAnk || '*'; cp = hd.closePana || '***'; cd = hd.closeAnk || '*';
            }

            if (selectedScope === 'both') { op = '***'; od = '*'; cp = '***'; cd = '*'; }
            else if (selectedScope === 'open_only') { op = '***'; od = '*'; }
            else if (selectedScope === 'close_only') { cp = '***'; cd = '*'; }

            let compositeResultStr = (op === '***' && cp === '***') ? "" : `${op}-${od}${cd}-${cp}`;

            await db.collection('markets').doc(marketId).update({
                openPana: op, openAnk: od, closePana: cp, closeAnk: cd, result: compositeResultStr, status: "open", 
                date: targetDbBidDateDash,
                isManual: true,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            if (selectedScope === 'both') { 
                await db.collection('market_results_history').doc(historyDocId).delete(); 
            } else {
                await db.collection('market_results_history').doc(historyDocId).update({ 
                    result: compositeResultStr, openPana: op, openAnk: od, closePana: cp, closeAnk: cd,
                    isManual: true
                });
            }

            Swal.fire({ title: 'Revert Successful!', text: `Successfully reverted requested session state. Lock released!`, icon: 'success', background: '#161920', color: '#fff' }).then(() => { loadMarkets(); });
        } catch (err) { 
            console.error(err); 
            Swal.fire({title: 'Error', text: err.message, icon: 'error', background: '#161920', color: '#fff'}); 
        }
    });
}
