<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Support Premium - Deccan Club</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            --bg-main: #0E1015;
            --bg-secondary: #161A22;
            --bg-card: #1B202A;
            --accent-gold: #E8B84A;
            --color-green: #22C55E;
            --color-red: #EF4444;
            --color-blue: #3B82F6;
            --text-primary: #FFFFFF;
            --text-secondary: #8E96A4;
            --border-thin: 1px solid rgba(255, 255, 255, 0.06);
        }

        html, body {
    margin: 0; padding: 0; 
    min-height: 100vh;
    width: 100%;
    background-color: var(--bg-main); color: var(--text-primary); 
    font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
    overflow-y: auto !important; /* ✅ स्क्रॉल ऑन कर दिया */
}

.support-container {
    max-width: 480px; margin: 0 auto; 
    min-height: 100vh;
    display: flex; flex-direction: column; background: var(--bg-main); position: relative;
    overflow-y: auto !important; /* ✅ स्क्रॉल ऑन कर दिया */
}


        .tab-bar { display: flex; background: var(--bg-secondary); border-bottom: var(--border-thin); padding: 0 4px; z-index: 5; flex-shrink: 0; }
        .tab-btn {
            flex: 1; text-align: center; padding: 14px 0; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s ease;
        }
        .tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

        .screen { 
            display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; min-height: 0; 
        }
        .screen.active { display: flex; }

        .chat-area { 
            flex: 1; 
            overflow-y: auto !important; 
            -webkit-overflow-scrolling: touch !important; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            padding: 16px 16px 110px 16px !important; 
            box-sizing: border-box;
        }

        .chat-footer { 
            position: fixed !important; bottom: 0 !important; left: 50% !important;
            transform: translateX(-50%) !important; width: 100% !important; max-width: 480px !important;
            padding: 12px 14px 20px 14px !important; 
            background: var(--bg-secondary) !important; border-top: var(--border-thin) !important; 
            display: flex !important; flex-direction: column !important; gap: 8px !important; 
            box-sizing: border-box !important; z-index: 9999 !important; flex-shrink: 0 !important;
            padding-bottom: calc(16px + env(safe-area-inset-bottom)) !important;
        }

        .ticket-main-issue-card { 
            background: rgba(255, 145, 0, 0.08) !important; border: 1px solid rgba(255, 145, 0, 0.25) !important; 
            border-radius: 12px !important; padding: 12px !important; margin-bottom: 4px !important; width: 100% !important; box-sizing: border-box;
        }
        .ticket-main-issue-card .issue-title-node { color: #ff9100 !important; font-weight: 700 !important; font-size: 11px !important; text-transform: uppercase; margin-bottom: 4px; }
        .ticket-main-issue-card .issue-body-text { color: #ffffff !important; font-size: 13px !important; font-weight: 500; line-height: 1.4; }

        .status-badge { float: right; padding: 3px 10px; border-radius: 50px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-open { background: rgba(0, 191, 255, 0.12) !important; color: #00bfff !important; border: 1px solid rgba(0, 191, 255, 0.2) !important; }
        .status-working { background: rgba(255, 145, 0, 0.12) !important; color: #ff9100 !important; border: 1px solid rgba(255, 145, 0, 0.2) !important; }
        .status-closed { background: rgba(46, 213, 115, 0.12) !important; color: #2ed573 !important; border: 1px solid rgba(46, 213, 115, 0.2) !important; }

        .bubble { max-width: 85%; padding: 11px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.45; box-sizing: border-box; flex-shrink: 0; }
        .bubble.system { background: var(--bg-secondary); color: var(--text-primary); align-self: flex-start; border-top-left-radius: 2px; border: var(--border-thin); width: 100%; max-width: 100%; }
        .bubble.admin { background: rgba(59, 130, 246, 0.12); color: #DFE7F5; align-self: flex-start; border-top-left-radius: 2px; border: 1px solid rgba(59, 130, 246, 0.25); width: 100%; max-width: 100%; }
        .bubble.user { background: var(--accent-gold); color: #000000; align-self: flex-end; border-top-right-radius: 2px; font-weight: 600; }

        .options-container { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; width: 100%; }
        .option-btn {
            background: var(--bg-card); border: var(--border-thin); color: var(--accent-gold); padding: 12px 14px; border-radius: 10px; font-size: 13px;
            text-align: left; cursor: pointer; font-weight: 500; display: flex; align-items: center; justify-content: space-between; transition: all 0.1s ease;
        }
        .option-btn::after { content: '\f054'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 10px; opacity: 0.5; }
        .option-btn:active { background: var(--accent-gold); color: #000000; }

        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .chat-input { flex: 1; background: var(--bg-main); border: var(--border-thin); border-radius: 20px; color: var(--text-primary); padding: 10px 16px; font-size: 13.5px; outline: none; }
        .action-icon-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--accent-gold); border: none; width: 38px; height: 38px; border-radius: 50%; color: #000000; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 14px; flex-shrink: 0; }

        #screenHistory { overflow-y: auto; padding: 16px 16px 120px 16px; -webkit-overflow-scrolling: touch; box-sizing: border-box; }
        .ticket-card { background: var(--bg-card); border: var(--border-thin); border-radius: 12px; padding: 14px; margin-bottom: 12px; cursor: pointer; position: relative; overflow: hidden; }

        .local-preview-container { display: none; align-items: center; gap: 8px; background: var(--bg-main); padding: 6px 10px; border-radius: 8px; border: var(--border-thin); width: fit-content; }
        .local-preview-img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; border: 1px solid var(--accent-gold); }
        .remove-preview-btn { color: var(--color-red); font-size: 14px; cursor: pointer; margin-left: 4px; }

        .active-ticket-banner { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #FFD2D2; margin: 12px 16px 0 16px; line-height: 1.4; flex-shrink: 0; }
        
        .custom-toast { position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #1E2330; border-left: 4px solid var(--accent-gold); padding: 12px 18px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 85%; max-width: 380px; display: flex; align-items: center; gap: 12px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .custom-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .toast-text { font-size: 12.5px; color: var(--text-primary); font-weight: 500; }

        .ticket-success-wrapper { background: var(--bg-card); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 16px; padding: 24px 16px; text-align: center; margin: 15px 0; }
        .success-icon-shield { width: 50px; height: 50px; background: rgba(34, 197, 94, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px auto; color: var(--color-green); font-size: 24px; }
        .success-headline { font-size: 16px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }
        .success-body-box { font-size: 12.5px; color: #D1D5DB; line-height: 1.5; text-align: left; background: rgba(0,0,0,0.15); padding: 12px; border-radius: 8px; border: var(--border-thin); }
        
        /* 👑 FIXED: CANCEL MODAL PERFECTLY CENTERED WITH FLEX ENGINE 👑 */
        .premium-confirm-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
            z-index: 99999; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
        }
        .premium-confirm-overlay.show { opacity: 1; pointer-events: auto; }
        .premium-confirm-box {
            background: #1B202A; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            width: 86%; max-width: 340px; padding: 22px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.9); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .premium-confirm-overlay.show .premium-confirm-box { transform: scale(1); }
        .confirm-icon-alert { font-size: 32px; color: var(--color-red); margin-bottom: 12px; }
        .confirm-title-text { font-size: 16px; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
        .confirm-desc-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
        .confirm-action-row { display: flex; gap: 12px; }
        .confirm-btn-ui { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
        .confirm-btn-no { background: #2e2e38; color: #ffffff; }
        .confirm-btn-yes { background: var(--color-red); color: #ffffff; }
    </style>
    <script>
        function refreshViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', refreshViewportHeight);
        window.addEventListener('DOMContentLoaded', refreshViewportHeight);
    </script>
</head>
<body>

    <div id="customToastBox" class="custom-toast">
        <i class="fa-solid fa-circle-check" style="color:var(--accent-gold);"></i>
        <div id="customToastText" class="toast-text">Alert</div>
    </div>

    <!-- DYNAMIC CENTERED OVERLAY MODAL FOR POPUPS -->
    <div id="premiumConfirmModal" class="premium-confirm-overlay">
        <div class="premium-confirm-box">
            <div class="confirm-icon-alert"><i class="fa-solid fa-circle-exclamation"></i></div>
            <div class="confirm-title-text" id="confirmTitleNode">Cancel Request?</div>
            <div class="confirm-desc-text" id="confirmDescNode">क्या आप निश्चित रूप से आगे बढ़ना चाहते हैं?</div>
            <div class="confirm-action-row">
                <button id="btnConfirmNo" class="confirm-btn-ui confirm-btn-no">No, Go Back</button>
                <button id="btnConfirmYes" class="confirm-btn-ui confirm-btn-yes">Yes, Proceed</button>
            </div>
        </div>
    </div>

    <div class="support-container">
        <header>  
            <div class="top-header">  
                <div class="header-left">
                    <a id="headerBackBtn" class="menu-btn" style="cursor:pointer;"><i class="fa-solid fa-arrow-left"></i></a>
                    <div class="logo-text" id="headerTitle">CUSTOMER SUPPORT</div>
                </div>
                <div class="wallet-pill" id="headerWalletBlock" style="display: none;">
                    <i class="fa-solid fa-wallet"></i> <span id="headerWalletBalance">₹0</span>
                </div>
            </div>
        </header>

        <div class="tab-bar" id="tabBar">
            <div class="tab-btn active" id="tabAiChat"><i class="fa-solid fa-robot"></i> AI Support</div>
            <div class="tab-btn" id="tabHistory"><i class="fa-solid fa-receipt"></i> My Tickets</div>
        </div>

        <div id="screenAiChat" class="screen active">
            <div id="lockBannerZone"></div>
            <div class="chat-area" id="aiChatWorkspace"></div>
            
            <div class="chat-footer" id="chatFooterInput">
                <div class="local-preview-container" id="localImagePreviewShard">
                    <img id="localPreviewImgTarget" class="local-preview-img" src="" alt="Preview">
                    <span style="font-size:11px; color:var(--text-secondary);">Screenshot linked</span>
                    <i class="fa-solid fa-circle-xmark remove-preview-btn" id="clearPreviewBtn"></i>
                </div>
                <div class="input-row">
                    <button class="action-icon-btn" id="attachFileBtn" type="button"><i class="fa-solid fa-plus"></i></button>
                    <input type="file" id="chatFileEngine" accept="image/*" style="display:none">
                    <input type="text" id="chatInputField" class="chat-input" placeholder="Type message or details...">
                    <button class="send-btn" id="sendPayloadBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="screenHistory" class="screen">
            <div id="historyLogContainer" style="width:100%;"></div>
        </div>
    </div>

    <script type="module" src="support.js"></script>
</body>
</html>
