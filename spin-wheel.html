<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Deccan Club - लकी स्पिन व्हील</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Master Production CSS -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* स्पिन व्हील प्रीमियम HD स्टाइलिंग (Original Image 2 Size Restored) */
    .spin-main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 15px;
      gap: 15px;
      padding-bottom: 40px;
    }

    .chances-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid #3b82f644;
      border-radius: 16px;
      padding: 14px 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 380px;
    }

    .chances-card p {
      margin: 0;
      font-size: 13px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chances-card h3 {
      margin: 4px 0 0 0;
      font-size: 22px;
      color: #f8fafc;
      font-weight: 700;
    }

    .chances-count {
      color: #fbbf24;
      font-size: 26px;
    }

    /* Wheel Wrapper with Dynamic Shadow */
    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top Red Pointer */
    .wheel-pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 28px solid #ef4444;
      z-index: 20;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
    }

    /* Outer Ring Frame */
    .wheel-frame {
      width: 310px;
      height: 310px;
      border-radius: 50%;
      border: 6px solid #fbbf24;
      box-shadow: 0 0 25px rgba(251, 191, 36, 0.3), inset 0 0 15px rgba(0, 0, 0, 0.8);
      position: relative;
      background: #0f172a;
      overflow: hidden;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.15, 1);
    }

    /* Center Wheel Knob */
    .wheel-center-cap {
      position: absolute;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #fbbf24 0%, #d97706 100%);
      border: 4px solid #ffffff;
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    /* Action Spin Button */
    .spin-action-btn {
      background: linear-gradient(135deg, #eab308, #ca8a04);
      color: #000000;
      border: none;
      padding: 14px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(234, 179, 8, 0.4);
      transition: all 0.2s ease;
      width: 100%;
      max-width: 320px;
      letter-spacing: 0.5px;
    }

    .spin-action-btn:disabled {
      background: #334155;
      color: #64748b;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Rules & Info Card (Original Size Restored without extra bottom CTA) */
    .info-guide-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      width: 100%;
      max-width: 380px;
      margin-top: 5px;
    }

    .info-guide-card h4 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-guide-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-guide-list li {
      font-size: 13px;
      color: #cbd5e1;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.4;
    }

    .info-guide-list li i {
      color: #f59e0b;
      margin-top: 2px;
    }

    /* Reward Modal */
    .reward-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .reward-modal.active {
      display: flex;
    }

    .modal-card {
      background: #1e293b;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      border: 1px solid #475569;
      animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-icon {
      font-size: 50px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 22px;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .modal-text {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* Deposit Button for Better Luck Next Time Modal */
    .modal-cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #000000;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
      border: none;
      cursor: pointer;
    }

    /* Normal Close Button for Winning */
    .modal-close-btn {
      background: #2563eb;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body class="no-hud">

  <!-- Header -->
  <header class="top-header">
    <div class="header-left">
      <!-- Added id="backBtn" here -->
      <a href="index.html" id="backBtn" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <h1 class="page-title">Lucky Spinner</h1>
    </div>
    <div class="header-right">
      <div class="wallet-pill">
        <i class="fa-solid fa-wallet"></i>
        <span id="walletBalance">₹0</span>
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <main class="content-body spin-main-container">

    <!-- Counter Card -->
    <div class="chances-card">
      <p>उपलब्ध स्पिन मौका</p>
      <h3><span class="chances-count" id="spinChancesCount">0</span> स्पिन बाकी</h3>
    </div>

    <!-- Spin Wheel Canvas Container -->
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <div class="wheel-frame">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
      </div>
      <div class="wheel-center-cap">
        <i class="fa-solid fa-star"></i>
      </div>
    </div>

    <!-- Spin Action Button -->
    <button class="spin-action-btn" id="spinBtn" disabled>
      <i class="fa-solid fa-rotate" style="margin-right: 8px;"></i> स्पिन करें
    </button>

    <!-- Info Guide Card (Clean without extra bottom button) -->
    <div class="info-guide-card">
      <h4><i class="fa-solid fa-circle-info"></i> स्पिन चांस नियम</h4>
      <ul class="info-guide-list">
        <li>
          <i class="fa-solid fa-gift"></i>
          <span><b>डेली फ्री स्पिन:</b> प्रतिदिन ऐप खोलने पर 1 फ्री स्पिन मौका प्राप्त होता है।</span>
        </li>
        <li>
          <i class="fa-solid fa-coins"></i>
          <span><b>डिपॉजिट ऑफर:</b> ₹200 ऐड करें = 1 स्पिन | ₹500 ऐड करें = 2 स्पिन | ₹1000 ऐड करें = 3 स्पिन</span>
        </li>
      </ul>
    </div>

  </main>

  <!-- Result Modal -->
  <div class="reward-modal" id="rewardModal">
    <div class="modal-card">
      <div class="modal-icon" id="modalIcon"><i class="fa-solid fa-trophy"></i></div>
      <h3 class="modal-title" id="modalTitle">बधाई हो!</h3>
      <p class="modal-text" id="modalMessage">आपको रिवॉर्ड प्राप्त हुआ है!</p>
      
      <!-- Dynamic Button Container -->
      <div id="modalActionContainer"></div>
    </div>
  </div>

  <!-- Modular Scripts -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="session.js"></script>
  <script type="module" src="Spin-wheel.js"></script>

  <!-- URL Param persistence script for Back Button -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const uid = urlParams.get('uid');
      const mobile = urlParams.get('mobile');
      const backBtn = document.getElementById('backBtn');
      
      if (backBtn && (uid || mobile)) {
        const param = uid ? `uid=${uid}` : `mobile=${mobile}`;
        backBtn.href = `index.html?${param}`;
      }
    });
  </script>
</body>
</html>
